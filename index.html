<!DOCTYPE html>
<html>
<head>
  <title>Weight Calculator</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      padding: 20px;
    }
    .card {
      background: white;
      padding: 20px;
      max-width: 400px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .result {
      margin-top: 15px;
      background: #fff3cd;
      padding: 12px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Weight Calculator</h2>

  <input type="number" id="p" placeholder="Product Total Weight">
  <input type="number" id="c" placeholder="Weight of Caps">
  <input type="number" id="s" placeholder="Sample Weight">
  <input type="number" id="w" placeholder="Waste">

  <button onclick="calc()">Calculate</button>

  <div class="result" id="out"></div>
</div>

<script>
function calc() {
  let P = parseFloat(document.getElementById("p").value);
  let C = parseFloat(document.getElementById("c").value);
  let S = parseFloat(document.getElementById("s").value);
  let W = parseFloat(document.getElementById("w").value);

  if (isNaN(P) || isNaN(C) || isNaN(S) || isNaN(W)) {
    alert("Please enter all values");
    return;
  }

  let A = P - C;
  let B = A - S - W - (A * 0.0002);

  let yieldPercent = (B / A) * 100;
  let theoretical = ((B + S + W) / A) * 100;

  document.getElementById("out").innerHTML =
    "<b>Blend Weight (A):</b> " + A.toFixed(2) + "<br>" +
    "<b>Final Weight (B):</b> " + B.toFixed(2) + "<br>" +
    "<b>Yield %:</b> " + yieldPercent.toFixed(2) + "%<br>" +
    "<b>Theoretical %:</b> " + theoretical.toFixed(2) + "%";
}
</script>

</body>
</html>
